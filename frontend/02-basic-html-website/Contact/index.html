    <main>
      <section>
        <h1>Información de Contacto</h1>
        <p>¿Tienes un proyecto en mente o quieres ponerte en contacto? Escríbeme.</p>
      </section>

      <form method="POST">
        <fieldset>
          <legend>Información de contacto</legend>
          <div>
            <label for="name">Nombre</label>
            <input type="text" id="name" name="name" placeholder="Nombre completo" required autocomplete="name">
          </div>
          <div>
            <label for="email">Correo</label>
            <input type="email" id="email" name="email" placeholder="Correo electrónico" required autocomplete="email">
          </div>
          <div>
            <label for="msg">Mensaje</label>
            <textarea id="msg" name="msg" placeholder="Aquí su mensaje" required></textarea>
          </div>
          <button type="submit">Enviar</button>
        </fieldset>
      </form>
    </main>
