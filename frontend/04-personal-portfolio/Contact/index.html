      <main>
        <section class="hero">
          <h1>Información de Contacto</h1>
          <p>¿Tienes un proyecto en mente o quieres ponerte en contacto? Escríbeme.</p>
        </section>

        <form class="contact" method="POST">
          <fieldset>
            <legend>Información de contacto</legend>
            <div>
              <label for="name">Nombre</label>
              <input type="text" id="name" name="name" placeholder="Nombre completo" required autocomplete="name">
            </div>
            <div>
              <label for="email">Correo</label>
              <input type="email" id="email" name="email" placeholder="Correo electrónico" required autocomplete="email">
            </div>
            <div>
              <label for="msg">Mensaje</label>
              <textarea id="msg" name="msg" placeholder="Aquí su mensaje" required></textarea>
            </div>
            <button type="submit">Enviar</button>
          </fieldset>
        </form>
      </main>
      <footer>
        <section>
          <h2>Opiniones</h2>
          <div class="reviews">
            <figure>
              <blockquote>
                <p>Gustavo siempre entregó más de lo que se le pedía. Su proyecto de gestión de inventario fue el más completo de la clase, con documentación clara y código ordenado.</p>
              </blockquote>
              <figcaption><cite>Elena Vásquez</cite>, <small>Profesora universitaria</small></figcaption>
            </figure>
            <figure>
              <blockquote>
                <p>En seis meses Gustavo pasó de no conocer nuestra base de código a liderar mejoras de accesibilidad que impactaron a miles de usuarios. Un profesional confiable y metódico.</p>
              </blockquote>
              <figcaption><cite>Rodrigo Salcedo</cite>, <small>Jefe de pasantía</small></figcaption>
            </figure>
            <figure>
              <blockquote>
                <p>Le encargué el sitio web de mi negocio sin saber qué esperar. El resultado fue limpio, rápido y fácil de usar. Me explicó cada decisión sin tecnicismos innecesarios.</p>
              </blockquote>
              <figcaption><cite>Marta Colina</cite>, <small>Cliente freelance</small></figcaption>
            </figure>
          </div>
        </section>
